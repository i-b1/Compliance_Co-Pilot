mcs.metadata:
  componentName: Conversation Start
  description: This system topic triggers when the agent receives an Activity indicating the beginning of a new conversation. If you do not want the agent to initiate the conversation, disable this topic.
kind: AdaptiveDialog
beginDialog:
  kind: OnConversationStart
  id: main
  actions:
    - kind: SendActivity
      id: sendMessage_M0LuhV
      activity:
        text:
          - "Hello! I'm your **Compliance Co-Pilot** 🔍\n\nAsk me a compliance question like:\n- *\"Does our data breach notification process comply with GDPR?\"*\n- *\"Is our data retention policy HIPAA-compliant?\"*\n- *\"Check our access control policy against SOC2\"*\n\nI'll compare regulatory requirements against your internal policies and identify any gaps."
        speak:
          - Hello and thank you for calling {System.Bot.Name}. Please note that some responses are generated by AI and may require verification for accuracy. How may I help you today?